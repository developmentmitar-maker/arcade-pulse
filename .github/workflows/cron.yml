name: Website Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Call Cron API
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron"
